project_id = "maayanhot"

[api]
enabled = true
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
major_version = 17

[db.seed]
enabled = true
sql_paths = ["./seed/001_base_reference.sql"]

[studio]
enabled = true

[auth]
enabled = true
site_url = "http://localhost:3000"

[storage]
enabled = true
file_size_limit = "25MiB"

[storage.buckets.report-media]
public = false
file_size_limit = "15MiB"
allowed_mime_types = ["image/jpeg", "image/png", "image/webp", "image/heic"]
